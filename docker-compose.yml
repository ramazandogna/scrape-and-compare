# ═══════════════════════════════════════════════════════════
# Docker Compose — Development Infrastructure
# ═══════════════════════════════════════════════════════════
#
# Kullanım:
#   docker compose up -d     → Servisleri başlat (arka planda)
#   docker compose down      → Durdur
#   docker compose logs -f   → Logları takip et
#
# Servisler:
#   postgres  → PostgreSQL 15 (port 5432)
#   redis     → Redis 7 (port 6379) — BullMQ kuyruk motoru
#   pgadmin   → Web UI (port 5050) — DB'yi görsel yönet
#
# ⚠️ .env dosyasındaki DATABASE_URL bu servise bağlanır:
#   DATABASE_URL=postgresql://scrape:scrape_dev_2024@localhost:5432/scrape_db
# ═══════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:15-alpine
    container_name: scrape-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scrape}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scrape_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-scrape_db}
    volumes:
      # Named volume — container silinse bile veri kalır
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scrape}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis 7 — BullMQ Kuyruk Motoru
  # ─────────────────────────────────────────
  # BullMQ, job queue state'ini Redis'te tutar:
  #   - WAITING, ACTIVE, COMPLETED, FAILED listeleri
  #   - Event pub/sub (job tamamlandı, hata oluştu)
  #   - Delayed jobs (zamanlı çalıştırma)
  #
  # Redis verisi geçicidir — container restart'ta kaybolabilir.
  # Queue job'ları zaten kısa ömürlü, kalıcı veri PostgreSQL'de.
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scrape-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scrape-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@scrape.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
