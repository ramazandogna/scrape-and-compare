# ═══════════════════════════════════════════════════════════
# Docker Compose — Development Infrastructure
# ═══════════════════════════════════════════════════════════
#
# Kullanım:
#   docker compose up -d     → Servisleri başlat (arka planda)
#   docker compose down      → Durdur
#   docker compose logs -f   → Logları takip et
#
# Servisler:
#   postgres  → PostgreSQL 15 (port 5432)
#   pgadmin   → Web UI (port 5050) — DB'yi görsel yönet
#
# ⚠️ .env dosyasındaki DATABASE_URL bu servise bağlanır:
#   DATABASE_URL=postgresql://scrape:scrape_dev_2024@localhost:5432/scrape_db
# ═══════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:15-alpine
    container_name: scrape-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scrape}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scrape_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-scrape_db}
    volumes:
      # Named volume — container silinse bile veri kalır
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scrape}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scrape-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@scrape.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
